server:
  port: 8080

spring:
  application:
    name: customer-onboarding-tracker
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/customer_onboarding}
    username: ${DB_USERNAME:${USER:postgres}}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

app:
  jwt:
    secret: ${JWT_SECRET:customer-onboarding-tracker-super-secret-key-change-me}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html

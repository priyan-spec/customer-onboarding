spring:
  datasource:
    url: jdbc:h2:mem:onboarding_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  jwt:
    secret: customer-onboarding-test-secret-key-with-enough-length
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
